<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti - Nuestro Universo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #03030c;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Fondo del espacio cósmico profundo */
        #universo-fondo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(circle at center, #0f0c1b 0%, #03030c 100%);
        }

        /* Interfaz Principal */
        .contenedor-interfaz {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 20px;
        }

        h1 {
            font-size: 2.8rem;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.4);
            animation: flotar 4s ease-in-out infinite;
            font-weight: 300;
        }

        .btn {
            background: transparent;
            color: #ffffff;
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            padding: 14px 35px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.4s ease;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #ffffff;
            color: #03030c;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            transform: scale(1.03);
        }

        /* Ventana Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 3, 12, 0.9);
            z-index: 20;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .modal.mostrar {
            display: flex;
            opacity: 1;
        }

        .modal-contenido {
            background: linear-gradient(135deg, rgba(18, 15, 36, 0.95) 0%, rgba(8, 7, 18, 0.95) 100%);
            border: 1px solid rgba(255, 105, 180, 0.2);
            padding: 45px 30px;
            border-radius: 20px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 40px rgba(147, 51, 234, 0.15);
            transform: translateY(20px);
            transition: transform 0.5s ease;
        }

        .modal.mostrar .modal-contenido {
            transform: translateY(0);
        }

        /* Mensajes de la Carta */
        .mensaje-texto {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 35px;
            color: #f3f3f6;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 300;
        }

        .progreso-puntos {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        .punto {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transition: background 0.3s;
        }

        .punto.activo {
            background: #ff69b4;
            box-shadow: 0 0 8px #ff69b4;
        }

        /* Efectos de fondo */
        .estrella-fugaz {
            position: absolute;
            width: 2px;
            height: 2px;
            background: linear-gradient(90deg, #ffffff, transparent);
            animation: fugaz 4s linear infinite;
            opacity: 0;
        }

        /* Contenedor Oculto para la música (YouTube API) */
        #contenedor-musica {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes fugaz {
            0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; width: 0; }
            10% { opacity: 1; width: 80px; }
            30% { transform: translateX(-300px) translateY(300px) rotate(-45deg); opacity: 0; width: 0; }
            100% { transform: translateX(-300px) translateY(300px) rotate(-45deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Fondo de Estrellas Cósmicas -->
    <div id="universo-fondo"></div>

    <!-- Contenedor del Reproductor de Música -->
    <div id="contenedor-musica"></div>

    <!-- Pantalla Inicial -->
    <div class="contenedor-interfaz" id="pantalla-inicio">
        <h1>NUESTRO UNIVERSO</h1>
        <button class="btn" onclick="abrirCarta()">Entrar</button>
    </div>

    <!-- Ventana de Mensajes Interactiva -->
    <div class="modal" id="modal-carta">
        <div class="modal-contenido">
            <div class="progreso-puntos" id="puntos-contenedor"></div>
            
            <div class="mensaje-texto" id="texto-dinamico"></div>
            
            <button class="btn" id="btn-accion" onclick="siguienteMensaje()">Continuar</button>
        </div>
    </div>

    <script>
        // Cargar asíncronamente la API del reproductor de YouTube
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let reproductor;
        function onYouTubeIframeAPIReady() {
            reproductor = new YT.Player('contenedor-musica', {
                height: '1',
                width: '1',
                videoId: 'U_Nfp42XUjI', // ID de 'Aquí Hay Para Llevar' de La Arrolladora
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': 'U_Nfp42XUjI'
                }
            });
        }

        // Mensajes personalizados
        const mensajes = [
            "Sé que las cosas han estado difíciles últimamente y que he cometido errores... 🌌",
            "Nuestro universo es demasiado bonito como para dejar que se apague por un momento gris.",
            "De verdad, perdóname. No quiero perderte, ni perder todo lo hermoso que estamos construyendo juntos. ✨",
            "Eres mi lugar seguro en este espacio tan grande. ¿Me dejas seguir cuidando de nuestro universo? ❤️"
        ];

        let indiceActual = 0;

        // Generar Estrellas Fijas de Fondo
        const fondo = document.getElementById('universo-fondo');
        for (let i = 0; i < 120; i++) {
            const estrella = document.createElement('div');
            estrella.style.position = 'absolute';
            const tamano = Math.random() * 2 + 1;
            estrella.style.width = tamano + 'px';
            estrella.style.height = tamano + 'px';
            estrella.style.backgroundColor = Math.random() > 0.3 ? '#fff' : '#ffe4e1';
            estrella.style.top = Math.random() * 100 + 'vh';
            estrella.style.left = Math.random() * 100 + 'vw';
            estrella.style.borderRadius = '50%';
            estrella.style.opacity = Math.random() * 0.8 + 0.2;
            fondo.appendChild(estrella);
        }

        // Generar Estrellas Fugaces
        setInterval(() => {
            const fugaz = document.createElement('div');
            fugaz.className = 'estrella-fugaz';
            fugaz.style.top = Math.random() * 40 + 'vh';
            fugaz.style.left = (Math.random() * 60 + 40) + 'vw';
            fugaz.style.animationDuration = (Math.random() * 2 + 2) + 's';
            fondo.appendChild(fugaz);
            setTimeout(() => fugaz.remove(), 4000);
        }, 3000);

        // Crear Puntos Indicadores
        const puntosContenedor = document.getElementById('puntos-contenedor');
        mensajes.forEach((_, i) => {
            const punto = document.createElement('div');
            punto.className = `punto ${i === 0 ? 'activo' : ''}`;
            puntosContenedor.appendChild(punto);
        });

        // Interacciones de la Pantalla
        function abrirCarta() {
            // Reproducir música tras la interacción del usuario
            if (reproductor && typeof reproductor.playVideo === 'function') {
                reproductor.playVideo();
            }

            const modal = document.getElementById('modal-carta');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('mostrar'), 10);
            actualizarContenido();
        }

        function actualizarContenido() {
            document.getElementById('texto-dinamico').innerText = mensajes[indiceActual];
            
            const puntos = document.querySelectorAll('.punto');
            puntos.forEach((p, idx) => {
                if (idx === indiceActual) p.classList.add('activo');
                else p.classList.remove('activo');
            });

            const btn = document.getElementById('btn-accion');
            if (indiceActual === mensajes.length - 1) {
                btn.innerText = "Te amo";
            } else {
                btn.innerText = "Continuar";
            }
        }

        function siguienteMensaje() {
            if (indiceActual < mensajes.length - 1) {
                indiceActual++;
                actualizarContenido();
            } else {
                alert('Tu respuesta significa mucho para mí 💫');
            }
        }
    </script>
</body>
</html>
